name: Deploy demo site to GitHub Pages

# Publishes the interactive demo (landing page + the two self-contained HTML tools) to
# GitHub Pages on every push to main. Site lands at https://<owner>.github.io/WireDAQ/.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble the static site
        run: |
          mkdir -p _site/dashboard
          cp site/index.html                      _site/index.html
          cp site/logo.png                        _site/logo.png
          cp tools/dashboard/index.html           _site/dashboard/index.html
          cp docs/diagrams/phase-pipeline.html     _site/roadmap.html
          # don't let Pages run the output through Jekyll
          touch _site/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
