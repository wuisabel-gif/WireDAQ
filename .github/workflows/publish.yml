name: Publish to PyPI

# Builds the sdist + wheel and publishes them to PyPI via Trusted Publishing (OIDC —
# no API tokens or secrets). Runs when a GitHub Release is published, or manually.
#
# One-time setup on PyPI (required before the first publish — see README / cpp note):
#   pypi.org → Account → Publishing → add a "pending publisher":
#     PyPI project name: wiredaq
#     Owner: wuisabel-gif   Repository: WireDAQ
#     Workflow name: publish.yml   Environment: pypi

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi-publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/wiredaq/
    permissions:
      id-token: write   # required for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
