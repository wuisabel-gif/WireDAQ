<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 340" width="440" height="340" role="img" aria-label="WireDAQ">
  <defs>
    <linearGradient id="wd-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7fd6ff"/>
      <stop offset="1" stop-color="#1e6fff"/>
    </linearGradient>
    <linearGradient id="wd-hex" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#56cffd"/>
      <stop offset="1" stop-color="#1f5fe0"/>
    </linearGradient>
    <filter id="wd-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- emblem -->
  <g filter="url(#wd-glow)">
    <!-- hexagon -->
    <path d="M100 130 L160 30 L280 30 L340 130 L280 230 L160 230 Z"
          fill="rgba(18,32,64,0.55)" stroke="url(#wd-hex)" stroke-width="7"
          stroke-linejoin="round"/>

    <!-- W -->
    <polyline points="132,72 160,190 188,120 216,190 244,72"
              fill="none" stroke="url(#wd-blue)" stroke-width="24"
              stroke-linecap="round" stroke-linejoin="round"/>

    <!-- D: bar + bowed curve -->
    <path d="M262 70 L262 192 M262 70 C320 78 320 184 262 192"
          fill="none" stroke="url(#wd-blue)" stroke-width="15"
          stroke-linecap="round" stroke-linejoin="round"/>

    <!-- circuit traces inside the D -->
    <g stroke="#7fe2ff" stroke-width="5" stroke-linecap="round">
      <line x1="270" y1="103" x2="300" y2="103"/>
      <line x1="270" y1="131" x2="306" y2="131"/>
      <line x1="270" y1="159" x2="300" y2="159"/>
    </g>
    <g fill="#aef0ff">
      <circle cx="304" cy="103" r="5.5"/>
      <circle cx="310" cy="131" r="5.5"/>
      <circle cx="304" cy="159" r="5.5"/>
    </g>
  </g>

  <!-- sparkles -->
  <g fill="#bfe6ff">
    <circle cx="150" cy="58" r="2.4" opacity=".7"/>
    <circle cx="300" cy="52" r="2" opacity=".55"/>
    <circle cx="120" cy="170" r="2" opacity=".5"/>
    <circle cx="316" cy="196" r="2.4" opacity=".6"/>
  </g>

  <!-- wordmark: light "Wire" + blue "DAQ" so it reads on a dark background -->
  <text x="220" y="306" text-anchor="middle"
        font-family="'Helvetica Neue',Arial,sans-serif" font-weight="800"
        font-size="62" letter-spacing="2">
    <tspan fill="#eaf1ff">Wire</tspan><tspan fill="#2f8bff">DAQ</tspan>
  </text>
</svg>
