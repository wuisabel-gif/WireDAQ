# WireDAQ packet schema — starter definition.
#
# Single source of truth for the wire format. Both the Python simulator codec
# (src/wiredaq/daq_sim) and the C firmware codec are built against this file; the golden
# vectors in src/wiredaq/protocol/golden/ are generated from it and must be reproduced
# byte-for-byte by every codec. See docs/adr/0001-wire-ready-architecture.md.
#
# All multi-byte fields are little-endian. The frame is packed with no padding.
#
# ---------------------------------------------------------------------------
# SEQUENCING & TIMESTAMPS  (the load-bearing parts of this starter)
# ---------------------------------------------------------------------------
#   seq            Per-node uint32, incremented by exactly 1 for each packet a
#                  node emits. The receiver detects PACKET LOSS (a gap) and
#                  REORDERING (a decrease) from this field alone. It wraps at
#                  2^32; all comparisons must be done modulo 2^32, never as plain
#                  "less than". seq counts packets, not samples.
#
#   t_node_us      uint64, node-local time in MICROSECONDS at the first sample in
#                  this block. This is the node's own clock — not corrected to any
#                  global reference here. Whether node time or ground-station
#                  arrival time is authoritative is decided in ADR 0002.
#
#   sample_rate_hz Declared sampling rate. The receiver reconstructs each sample's
#                  timestamp from the block:
#                      t(sample_i) = t_node_us + round(i * 1_000_000 / sample_rate_hz)
#                  so only one timestamp is sent per block, not per sample.
# ---------------------------------------------------------------------------

protocol:
  name: wiredaq
  version: 1
  endianness: little
  magic: [0x57, 0x44]          # 'WD' frame sync word for byte-stream framing
  max_packet_bytes: 256        # bounds packets for small MCU MTUs (serial/UDP)
  crc:
    algorithm: CRC-16/CCITT-FALSE
    poly: 0x1021
    init: 0xFFFF
    reflect_in: false
    reflect_out: false
    xor_out: 0x0000
    # CRC is computed over every byte before the CRC field, including the magic:
    #   crc = crc16(frame[0 : len-2])
    covers: all_bytes_before_crc
    check: 0x29B1              # CRC of ASCII "123456789", for implementation tests

enums:
  msg_type:
    SAMPLE_BLOCK: 1           # data plane: a block of samples (defined below)
    # --- control plane (see ADR note at end of file) ---
    HEARTBEAT:    2           # node liveness / clock beacon: header-only, no payload
    DEVICE_INFO:  3           # reserved: node id, channel map, capabilities
    CONFIG_ACK:   4           # reserved: acknowledge a configuration change

# Fixed 24-byte header, present on EVERY packet of every msg_type.
header:
  - { name: magic,          type: u8[2], const: [0x57, 0x44] }
  - { name: version,        type: u8,    const: 1 }
  - { name: msg_type,       type: u8,    enum: msg_type }
  - { name: node_id,        type: u16,   doc: "which node sent this packet" }
  - { name: seq,            type: u32,   doc: "per-node packet counter; gaps = loss, decreases = reorder; wraps mod 2^32" }
  - { name: t_node_us,      type: u64,   doc: "node-local microseconds at the first sample/event in this packet" }
  - { name: sample_rate_hz, type: u32,   doc: "declared rate; receiver derives per-sample timestamps from it" }
  - { name: channel_count,  type: u8,    doc: "channels per sample (e.g. 3 for X/Y/Z)" }
  - { name: sample_count,   type: u8,    doc: "number of samples in this block; 0 is valid" }

# Payload layout, selected by msg_type. Only the data-plane payload is defined in
# this starter; the reserved control types above will get their own payloads later.
payloads:
  SAMPLE_BLOCK:
    repeat: sample_count
    of:
      repeat: channel_count
      of: { name: value, type: i16, doc: "raw signed counts (scale factor applied downstream)" }

# 2-byte trailer, present on EVERY packet.
trailer:
  - { name: crc16, type: u16, computed: crc }

# ---------------------------------------------------------------------------
# DESIGN NOTES
# ---------------------------------------------------------------------------
# Control plane vs data plane: SAMPLE_BLOCK is the high-rate data plane. Node
# identity, capabilities, configuration, and liveness belong in the reserved
# control-plane message types above, NOT inside the sample stream. (Precedent:
# openDAQ separates structure/property transfer from data streaming.) Keeping the
# 24-byte header common across all msg_types means the receiver can frame, check
# CRC, and route by msg_type before it knows the payload shape.
#
# Deferred to follow-on ADRs (both must be Accepted before Phase 3):
#   ADR 0002 — Clock domain: t_node_us authority vs ground-station arrival; skew.
#   ADR 0003 — Wire format specifics: endianness, CRC, sizing, version negotiation.
